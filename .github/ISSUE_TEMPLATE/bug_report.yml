name: Bug report
description: Report a reproducible defect in the MCP server, bridge, or CEP panel
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed problem
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Exact steps, commands, and inputs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, Premiere version, and bridge mode if known
    validations:
      required: true
